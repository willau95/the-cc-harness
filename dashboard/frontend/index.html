<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <h1>Claude Harness <span id="version">v0.1</span></h1>
  <div id="metrics" class="metrics"></div>
</header>
<main>
  <section id="fleet">
    <h2>Fleet</h2>
    <div id="agents" class="list"></div>
  </section>
  <section id="detail">
    <h2 id="detail-title">Select an agent</h2>
    <div id="agent-detail"></div>
  </section>
  <aside id="feed">
    <h2>Global feed</h2>
    <div id="events" class="list"></div>
    <h2 style="margin-top:20px">Proposals</h2>
    <div id="proposals" class="list"></div>
    <h2 style="margin-top:20px">Projects</h2>
    <div id="projects" class="list"></div>
  </aside>
</main>
<script src="/static/app.js"></script>
</body>
</html>
